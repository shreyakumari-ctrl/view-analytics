<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience – MyTube Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="nav-left">
                <button id="sidebar-toggle" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
                <div class="logo"><i class="fa-brands fa-youtube color-primary"></i><span>MyTube Studio</span></div>
            </div>
            <div class="nav-center">
                <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text"
                        placeholder="Search…"></div>
            </div>
            <div class="nav-right">
                <button id="theme-toggle" class="icon-btn"><i class="fa-regular fa-moon"></i></button>
                <div class="notification" style="position:relative">
                    <button id="notif-btn" class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <span class="badge" id="notif-badge">3</span>
                    <div class="notif-panel" id="notif-panel">
                        <div class="notif-header">
                            <h4>Notifications</h4><button id="mark-all-read" class="btn-text-sm">Mark all read</button>
                        </div>
                        <div class="notif-list" id="notif-list"></div>
                    </div>
                </div>
                <img src="https://i.pravatar.cc/150?img=47" alt="Profile" class="avatar" id="nav-avatar">
            </div>
        </nav>
        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="nav-links">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                    <a href="videos.html" class="nav-link"><i class="fa-solid fa-video"></i><span>Videos</span></a>
                    <a href="videos.html?tab=shorts" class="nav-link"><i
                            class="fa-brands fa-tiktok"></i><span>Shorts</span></a>
                    <a href="analytics.html" class="nav-link"><i
                            class="fa-solid fa-chart-simple"></i><span>Analytics</span></a>
                    <a href="audience.html" class="nav-link active"><i
                            class="fa-solid fa-users"></i><span>Audience</span></a>
                    <a href="monetization.html" class="nav-link"><i
                            class="fa-solid fa-sack-dollar"></i><span>Monetization</span></a>
                    <div class="divider"></div>
                    <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
                    <a href="#" class="nav-link text-danger logout-btn"><i
                            class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></a>
                </div>
            </aside>

            <main class="content">
                <div class="content-header page-header-flex">
                    <h1>Audience Insights</h1>
                    <div class="header-actions">
                        <select class="sort-select" id="time-filter">
                            <option value="28" selected>Last 28 Days</option>
                            <option value="90">Last 90 Days</option>
                            <option value="all">Lifetime</option>
                        </select>
                    </div>
                </div>

                <!-- KPI row -->
                <div class="stats-grid" id="aud-kpis" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
                </div>

                <!-- Charts -->
                <div class="charts-container" style="grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px">
                    <div class="chart-card glass-glow">
                        <div class="chart-header">
                            <h3>Age Distribution</h3>
                        </div>
                        <div class="chart-body"><canvas id="ageChart"></canvas></div>
                    </div>
                    <div class="chart-card glass-glow">
                        <div class="chart-header">
                            <h3>Device Usage</h3>
                        </div>
                        <div class="chart-body"><canvas id="deviceChart"></canvas></div>
                    </div>
                    <div class="chart-card glass-glow">
                        <div class="chart-header">
                            <h3>Returning vs New</h3>
                        </div>
                        <div class="chart-body"><canvas id="retChart"></canvas></div>
                    </div>
                </div>

                <!-- Countries + Best Upload Time -->
                <div class="performance-insights">
                    <div class="insight-card glass-glow">
                        <div class="insight-header"><i class="fa-solid fa-globe" style="color:#2563eb"></i>
                            <h3>Top Countries</h3>
                        </div>
                        <div class="country-list" id="country-list"></div>
                    </div>
                    <div class="insight-card glass-glow">
                        <div class="insight-header"><i class="fa-solid fa-lightbulb highlight-gold"></i>
                            <h3>Best Upload Time</h3>
                        </div>
                        <div class="upload-time-content" id="upload-time-info"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = DB.getCurrentUser();
            if (!user) return;
            let videos = DB.getVideos(user.id);
            let fv = DB.filterVideosByRange(videos, '28');
            let charts = {};

            document.getElementById('time-filter')?.addEventListener('change', e => {
                fv = DB.filterVideosByRange(videos, e.target.value);
                renderKPIs();
                updateCharts();
                renderCountries();
            });

            function renderKPIs() {
                const k = DB.calcKPIs(fv);
                const grid = document.getElementById('aud-kpis');
                const retRate = 75;
                grid.innerHTML = [
                    { icon: 'fa-users', cls: 'subs-icon', label: 'Total Subscribers', val: DB.formatNum(user.subscribers) },
                    { icon: 'fa-rotate-right', cls: 'views-icon', label: 'Returning Viewers', val: retRate + '%' },
                    { icon: 'fa-user-plus', cls: 'comments-icon', label: 'New Viewers', val: (100 - retRate) + '%' },
                    { icon: 'fa-clock', cls: 'time-icon', label: 'Avg Session Duration', val: k.avgDuration + ' min' },
                    { icon: 'fa-globe', cls: 'likes-icon', label: 'Countries Reached', val: '5+' },
                ].map(c => `
            <div class="stat-card glass-glow animate-in">
                <div class="stat-icon ${c.cls}"><i class="fa-solid ${c.icon}"></i></div>
                <div class="stat-details"><h3>${c.label}</h3><h2>${c.val}</h2></div>
            </div>
        `).join('');
            }

            function initCharts() {
                const isDark = document.body.classList.contains('dark-mode');
                const tc = isDark ? '#94a3b8' : '#64748b';

                const age = DB.getAudienceAggregates(fv);
                const cA = document.getElementById('ageChart')?.getContext('2d');
                if (cA) {
                    charts.age = new Chart(cA, {
                        type: 'bar',
                        data: {
                            labels: ['13–17', '18–24', '25–34', '35–44', '45+'],
                            datasets: [{ label: '%', data: [age.age13_17, age.age18_24, age.age25_34, age.age35_44, age.age45_plus], backgroundColor: ['#3b82f6', '#2563eb', '#7c3aed', '#10b981', '#f59e0b'], borderRadius: 8, barPercentage: 0.65 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e293b', callbacks: { label: c => c.parsed.y + '%' } } }, scales: { x: { grid: { display: false }, ticks: { color: tc } }, y: { grid: { color: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(100,116,139,0.1)' }, ticks: { color: tc, callback: v => v + '%' } } } }
                    });
                }

                const dev = DB.getDeviceAggregates(fv);
                const cD = document.getElementById('deviceChart')?.getContext('2d');
                if (cD) {
                    charts.device = new Chart(cD, {
                        type: 'doughnut',
                        data: {
                            labels: ['Mobile', 'Desktop', 'Tablet', 'TV'],
                            datasets: [{ data: [dev.mobile, dev.desktop, dev.tablet, dev.tv], backgroundColor: ['#2563eb', '#7c3aed', '#10b981', '#f59e0b'], borderWidth: 0, hoverOffset: 8 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, color: tc } }, tooltip: { backgroundColor: '#1e293b', callbacks: { label: c => `${c.label}: ${c.parsed}%` } } } }
                    });
                }

                const cR = document.getElementById('retChart')?.getContext('2d');
                if (cR) {
                    charts.ret = new Chart(cR, {
                        type: 'doughnut',
                        data: {
                            labels: ['Returning', 'New'],
                            datasets: [{ data: [75, 25], backgroundColor: ['#2563eb', '#e2e8f0'], borderWidth: 0, hoverOffset: 8 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, color: tc } }, tooltip: { backgroundColor: '#1e293b', callbacks: { label: c => `${c.label}: ${c.parsed}%` } } } }
                    });
                }
            }

            function updateCharts() {
                const age = DB.getAudienceAggregates(fv);
                if (charts.age) { charts.age.data.datasets[0].data = [age.age13_17, age.age18_24, age.age25_34, age.age35_44, age.age45_plus]; charts.age.update(); }
                const dev = DB.getDeviceAggregates(fv);
                if (charts.device) { charts.device.data.datasets[0].data = [dev.mobile, dev.desktop, dev.tablet, dev.tv]; charts.device.update(); }
            }

            function renderCountries() {
                const el = document.getElementById('country-list');
                if (!el) return;
                const countries = [
                    { name: 'India', flag: '🇮🇳', pct: 45 },
                    { name: 'United States', flag: '🇺🇸', pct: 22 },
                    { name: 'United Kingdom', flag: '🇬🇧', pct: 12 },
                    { name: 'Canada', flag: '🇨🇦', pct: 8 },
                    { name: 'Australia', flag: '🇦🇺', pct: 6 },
                ];
                el.innerHTML = countries.map(c => `
            <div class="country-item">
                <span class="country-flag">${c.flag}</span>
                <div class="country-bar-wrap">
                    <div class="country-name-row"><span>${c.name}</span><span>${c.pct}%</span></div>
                    <div class="country-bar"><div class="country-bar-fill" style="width:${c.pct}%"></div></div>
                </div>
            </div>
        `).join('');

                const timeEl = document.getElementById('upload-time-info');
                if (timeEl) {
                    timeEl.innerHTML = `
                <div class="upload-suggestion">
                    <div class="best-time-card">
                        <div class="best-time-icon"><i class="fa-solid fa-sun"></i></div>
                        <div>
                            <div class="best-time-val">Saturday – Sunday</div>
                            <div class="best-time-sub">Best days to upload</div>
                        </div>
                    </div>
                    <div class="best-time-card">
                        <div class="best-time-icon" style="background:rgba(124,58,237,0.1);color:#7c3aed"><i class="fa-solid fa-clock"></i></div>
                        <div>
                            <div class="best-time-val">6 PM – 9 PM IST</div>
                            <div class="best-time-sub">Peak engagement hours</div>
                        </div>
                    </div>
                    <p style="font-size:.85rem;color:var(--text-secondary);margin-top:16px;line-height:1.6">
                        Based on your audience's activity patterns. Uploading during these windows can give your videos up to <strong>40% more initial views</strong>.
                    </p>
                </div>
            `;
                }
            }

            document.addEventListener('themeChanged', ({ detail: { isDark } }) => {
                const t = isDark ? '#94a3b8' : '#64748b';
                const g = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(100,116,139,0.1)';
                Object.values(charts).forEach(c => {
                    if (c.options.scales?.x?.ticks) c.options.scales.x.ticks.color = t;
                    if (c.options.scales?.y?.ticks) c.options.scales.y.ticks.color = t;
                    if (c.options.scales?.y?.grid) c.options.scales.y.grid.color = g;
                    if (c.options.plugins?.legend?.labels) c.options.plugins.legend.labels.color = t;
                    c.update();
                });
            });

            renderKPIs();
            initCharts();
            renderCountries();
        });
    </script>
</body>

</html>
